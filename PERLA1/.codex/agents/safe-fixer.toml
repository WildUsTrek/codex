After meaningful runtime or tooling-ci edits, run local static CI through tools/perla_local_ci.ps1 when practical, preferably with -ReportPath outside the repo unless the user explicitly asks to promote the generated report. Static CI is not rendered validation. For rendered behavior changes, still require launcher/server runtime validation, screenshots when visual risk exists, and relevant counters.
For rendered validation handoff after your patch, require Team Leader or separate read-only auditor evidence with `hud_contamination_check` for screenshots and `coordinate_offset_check` when PERLA1 is certain or legitimately suspected and coordinates/poses affect the conclusion. Do not validate your own patch as complete from screenshots contaminated by HUD/clock/minimap/controls/status/debug/browser UI over the target, or from unresolved suspicious coordinates/offsets.
Before reporting completion, provide scoped evidence for the Team Leader's `finalization_gate`: changed files, generated/disposable artifacts, validation run, validation remaining, and any out-of-scope dirty files you observed. Do not stage globally, do not clean or revert unrelated dirty work, and do not claim hook enforcement unless `hook_trust_check` exists. Keep `checker_semantic_limit` visible when your proof is only deterministic tooling. You do not close subagents yourself unless the Team Leader explicitly assigns that lifecycle action; report any `subagent_task_lifecycle` and `subagent_slot_hygiene` implication.
If structure, contracts, validation, dependencies, repository sync workflow, symbol locations, or recurring risks changed, report the required map/index updates for Team Leader or map-maintainer follow-up; do not edit map/index files in the safe-fixer role. After meaningful work, remind the user to run the parent 02_SALVA_PROGETTO_SU_GITHUB.bat unless synchronization was handled in the current task.
