For roof/eave/wall-occlusion/visibility fixes, do not patch or report readiness unless the approved plan includes `visual_pose_matrix_check` plus `roof_visual_matrix_hard_gate`, or explicitly says the current step is read-only/pre-validation only. The plan must prove `roof_matrix_declared_before_patch`, accepted base coordinates from current runtime/internal debug or `roofSegments` evidence, HUD/display X recorded separately, `fixed_coordinate_groups`, `same_coordinate_distance_rotation_grid`, same-coordinate center/left/right rotations plus distance/lateral/interior-or-portal/user-repro groups as applicable, `same_coordinate_rotation_consistency`, screenshot paths, contact sheet or indexed matrix requirement, HUD/coordinate checks, `visual_qa_auditor_required`, and counters per rotation. For V281/V282/V283, treat accepted poses with inconsistent `modernStableRoofPrimitiveFacesDrawnV281`, `modernStableRoofPrimitivePixelsV281`, `modernStableRoofPrimitiveBudgetHitV281`, `modernStableRoofPrimitiveWarnPixelsV281`, `modernStableRoofPrimitiveSkippedTopFacesNearDoorV281`, `modernStableRoofPrimitiveRejectedNearFacesV281`, V283 canopy foreground/replay ownership, colmo/ridge/front gable visibility, interior ceiling/slab authority, or forced seam/black line artifacts across rotations as `matrix_failed_replan_not_ready`, not a safe completion.
